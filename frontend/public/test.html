<!DOCTYPE html>
<html>
<head>
  <title>Test Employee Creation</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
    button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow: auto; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Employee Creation Test</h1>
  
  <div id="status"></div>
  
  <h2>Step 1: Login</h2>
  <button onclick="testLogin()">Test Login</button>
  <pre id="loginResult"></pre>
  
  <h2>Step 2: Create Employee</h2>
  <button onclick="testCreateEmployee()">Test Create Employee</button>
  <pre id="createResult"></pre>
  
  <h2>Step 3: List Employees</h2>
  <button onclick="testListEmployees()">Test List Employees</button>
  <pre id="listResult"></pre>

  <script>
    let token = null;
    
    async function testLogin() {
      const resultEl = document.getElementById('loginResult');
      resultEl.textContent = 'Logging in...';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: 'admin@example.com',
            password: 'password123'
          })
        });
        
        const data = await response.json();
        
        if (data.token) {
          token = data.token;
          localStorage.setItem('token', token);
          resultEl.className = 'success';
          resultEl.textContent = '✓ Login successful!\nToken: ' + token.substring(0, 50) + '...';
        } else {
          resultEl.className = 'error';
          resultEl.textContent = '✗ Login failed: ' + JSON.stringify(data, null, 2);
        }
      } catch (error) {
        resultEl.className = 'error';
        resultEl.textContent = '✗ Error: ' + error.message;
      }
    }
    
    async function testCreateEmployee() {
      const resultEl = document.getElementById('createResult');
      
      token = token || localStorage.getItem('token');
      
      if (!token) {
        resultEl.className = 'error';
        resultEl.textContent = '✗ Please login first!';
        return;
      }
      
      resultEl.textContent = 'Creating employee...';
      
      const employeeData = {
        firstName: 'Test',
        lastName: 'User',
        email: 'test.' + Date.now() + '@example.com',
        phoneNumber: '07700900000',
        jobTitle: 'Developer',
        employeeType: 'EMPLOYEE',
        department: 'IT',
        niNumber: 'AB123456C',
        startDate: '2025-11-01'
      };
      
      try {
        const response = await fetch('/api/employees', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(employeeData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
          resultEl.className = 'success';
          resultEl.textContent = '✓ Employee created successfully!\n\n' + JSON.stringify(data, null, 2);
        } else {
          resultEl.className = 'error';
          resultEl.textContent = '✗ Failed to create employee:\n\n' + JSON.stringify(data, null, 2);
        }
      } catch (error) {
        resultEl.className = 'error';
        resultEl.textContent = '✗ Error: ' + error.message;
      }
    }
    
    async function testListEmployees() {
      const resultEl = document.getElementById('listResult');
      
      token = token || localStorage.getItem('token');
      
      if (!token) {
        resultEl.className = 'error';
        resultEl.textContent = '✗ Please login first!';
        return;
      }
      
      resultEl.textContent = 'Loading employees...';
      
      try {
        const response = await fetch('/api/employees', {
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });
        
        const data = await response.json();
        
        if (response.ok) {
          resultEl.className = 'success';
          resultEl.textContent = '✓ Found ' + data.length + ' employees:\n\n' + 
            data.map(e => `${e.firstName} ${e.lastName} (${e.email})`).join('\n');
        } else {
          resultEl.className = 'error';
          resultEl.textContent = '✗ Failed to list employees:\n\n' + JSON.stringify(data, null, 2);
        }
      } catch (error) {
        resultEl.className = 'error';
        resultEl.textContent = '✗ Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
