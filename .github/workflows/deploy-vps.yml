name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check deployment secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "Missing VPS_HOST secret" && exit 1)
          test -n "${{ secrets.VPS_USER }}" || (echo "Missing VPS_USER secret" && exit 1)
          test -n "${{ secrets.VPS_SSH_KEY }}" || (echo "Missing VPS_SSH_KEY secret" && exit 1)

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: DEPLOY_MAIN_SITE=0 bash /var/www/6softhrm/scripts/deploy-vps.sh
